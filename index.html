<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NSS Command Radio - Admin</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Orbitron',sans-serif;
  background:linear-gradient(135deg,#020617,#0f172a,#020617);
  color:#e2e8f0;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card{
  width:95%;
  max-width:420px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(20px);
  border-radius:25px;
  padding:25px;
  text-align:center;
  box-shadow:0 0 40px rgba(0,0,0,0.6);
  border:1px solid rgba(255,255,255,0.08);
}

.title{
  font-size:20px;
  font-weight:700;
  letter-spacing:2px;
}

.subtitle{
  font-size:12px;
  color:#94a3b8;
  margin-bottom:10px;
}

#network{
  font-size:13px;
  margin-bottom:10px;
}

select{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:none;
  background:#020617;
  color:white;
  margin-top:10px;
}

.btn{
  width:100%;
  padding:14px;
  margin-top:15px;
  border-radius:15px;
  border:none;
  font-weight:bold;
  font-size:15px;
  transition:0.2s;
}

#talkBtn{
  background:linear-gradient(45deg,#22c55e,#16a34a);
}

#talkBtn:active{
  transform:scale(0.95);
  box-shadow:0 0 20px #22c55e;
}

#emergencyBtn{
  background:linear-gradient(45deg,#ef4444,#b91c1c);
}

#emergencyBtn:active{
  transform:scale(0.95);
  box-shadow:0 0 25px red;
}

.status{
  margin-top:15px;
  font-size:13px;
  color:#94a3b8;
}
</style>
</head>

<body>

<div class="card">

<div class="title">📡 NSS COMMAND RADIO</div>
<div class="subtitle">Admin Control Panel</div>

<div id="network">📶 Checking...</div>

<select id="channelSelect">
<option value="A">Channel A</option>
<option value="B">Channel B</option>
<option value="C">Channel C</option>
</select>

<button id="talkBtn" class="btn">🎤 HOLD TO TALK</button>
<button id="emergencyBtn" class="btn">🚨 EMERGENCY</button>

<div class="status" id="statusText">Idle</div>

</div>

<script src="https://walkie-server-1xum.onrender.com/socket.io/socket.io.js"></script>

<script>
const socket = io("https://walkie-server-1xum.onrender.com");

let audioContext, processor, input, stream;
let isRecording = false;

const talkBtn = document.getElementById("talkBtn");
const emergencyBtn = document.getElementById("emergencyBtn");
const channelSelect = document.getElementById("channelSelect");
const statusText = document.getElementById("statusText");

// 🎤 START RECORDING
async function startRecording(mode="normal"){
  if(isRecording) return;

  try{
    stream = await navigator.mediaDevices.getUserMedia({
      audio:{
        noiseSuppression:true,
        echoCancellation:true,
        autoGainControl:true,
        sampleRate:16000   // 🔥 FIXED
      }
    });
  }catch(e){
    alert("Microphone permission denied!");
    return;
  }

  audioContext = new (window.AudioContext || window.webkitAudioContext)();
  await audioContext.resume();

  input = audioContext.createMediaStreamSource(stream);

  const gainNode = audioContext.createGain();
  gainNode.gain.value = 0.9;   // 🔥 FIXED (no noise boost)

  processor = audioContext.createScriptProcessor(2048,1,1); // 🔥 FIXED

  input.connect(gainNode);
  gainNode.connect(processor);
  processor.connect(audioContext.destination);

  const channel = channelSelect.value;

  processor.onaudioprocess = (e)=>{
    let floatData = e.inputBuffer.getChannelData(0);

    // 🔥 smoothing
    for(let i=1;i<floatData.length;i++){
      floatData[i] = (floatData[i] + floatData[i-1]) / 2;
    }

    let intData = new Int16Array(floatData.length);

    for(let i=0;i<floatData.length;i++){
      intData[i] = Math.max(-1, Math.min(1, floatData[i])) * 32767;
    }

    if(mode==="emergency"){
      socket.emit("emergency-stream", intData);
    }else{
      socket.emit("audio-stream",{
        channel:channel,
        audio:intData
      });
    }
  };

  isRecording = true;
  statusText.innerText = mode==="emergency" ? "🚨 Emergency Broadcasting..." : "🎤 Transmitting...";
}

// ⏹ STOP
function stopRecording(){
  if(!isRecording) return;

  if(processor) processor.disconnect();
  if(input) input.disconnect();
  if(stream) stream.getTracks().forEach(t=>t.stop());

  isRecording = false;
  statusText.innerText = "Idle";
}

// MOBILE
talkBtn.ontouchstart = ()=>startRecording("normal");
talkBtn.ontouchend = stopRecording;

emergencyBtn.ontouchstart = ()=>startRecording("emergency");
emergencyBtn.ontouchend = stopRecording;

// DESKTOP
talkBtn.onmousedown = ()=>startRecording("normal");
talkBtn.onmouseup = stopRecording;

emergencyBtn.onmousedown = ()=>startRecording("emergency");
emergencyBtn.onmouseup = stopRecording;

// 📶 NETWORK
function checkNetwork(){
  const start = Date.now();
  socket.emit("ping-check", start);

  socket.once("pong-check",(time)=>{
    const latency = Date.now() - time;
    const net = document.getElementById("network");

    if(latency < 100){
      net.innerText = "📶 Strong ("+latency+"ms)";
      net.style.color = "#22c55e";
    }else if(latency < 300){
      net.innerText = "📶 Medium ("+latency+"ms)";
      net.style.color = "#facc15";
    }else{
      net.innerText = "📶 Weak ("+latency+"ms)";
      net.style.color = "#ef4444";
    }
  });
}

setInterval(checkNetwork,3000);
</script>

</body>
</html>
